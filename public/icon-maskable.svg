<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 100 120" fill="none">
  <title>不委屈 Logo 512px (maskable)</title>
  <!-- maskable icon 需要 80% 安全区：Logo 缩放到 80% 居中 -->
  <rect width="100" height="120" fill="#FAF7F2" />
  <!-- Logo 缩放到 80%（10% padding on all sides） -->
  <g transform="translate(10, 12) scale(0.8)">
    <rect x="33" y="22" width="34" height="84" rx="14" ry="14" fill="#9CAF88" />
    <circle cx="50" cy="18" r="8" fill="#D67D6A" />
    <rect x="38" y="30" width="4" height="60" rx="2" ry="2" fill="#B7C9A3" opacity="0.5" />
    <circle cx="50" cy="48" r="1.4" fill="#7E9863" opacity="0.55" />
    <circle cx="50" cy="62" r="1.4" fill="#7E9863" opacity="0.55" />
    <circle cx="50" cy="76" r="1.4" fill="#7E9863" opacity="0.55" />
    <circle cx="50" cy="90" r="1.4" fill="#7E9863" opacity="0.55" />
  </g>
</svg>
